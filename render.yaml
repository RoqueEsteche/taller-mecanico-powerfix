# render.yaml — PowerFix
# Un único servicio: FastAPI sirve la API Y el frontend estático.
# Documentación: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: powerfix-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
